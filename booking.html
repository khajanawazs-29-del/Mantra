  <meta name="keywords" content="hotel booking, room booking form, hotel reservation">
  <link rel="canonical" href="https://nawazhotel.netlify.app/booking.html">
  <link rel="icon" href="images/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">

  <meta property="og:title" content="Booking | Nawaz Hotel">

  <h1>Nawaz Hotel</h1>
</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>
  <a href="rooms.html">Rooms</a>
  <a href="gallery.html">Gallery</a>

<div class="banner">
  <h2>Book Your Stay</h2>
</div>

<div class="container">
  <h2>Room Cost Calculator</h2>
  <form onsubmit="return false;">
    <label for="roomSelect">Select Room Type</label>
    <select id="roomSelect">
      <option value="2200">Deluxe Room - Rs. 2,200 / night</option>
      <option value="3500">Executive Room - Rs. 3,500 / night</option>
      <option value="5800">Royal Suite - Rs. 5,800 / night</option>
    </select>

    <label for="nightCount">Number of Nights</label>
    <input type="number" id="nightCount" placeholder="Enter number of nights" min="1">

    <button type="button" class="btn" onclick="calculateCost()">Calculate Cost</button>
    <p id="costResult" class="result"></p>
  </form>
</div>

<div class="container">
  <h2>Booking Form</h2>
  <form onsubmit="return validateForm()">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label for="email">Email Address</label>
    <input type="text" id="email" placeholder="Enter your email">

    <label for="phone">Mobile Number</label>
    <input type="text" id="phone" placeholder="Enter 10 digit mobile number">

    <label for="roomType">Preferred Room Type</label>
    <select id="roomType">
      <option value="">Select Room Type</option>
      <option>Deluxe Room</option>
      <option>Executive Room</option>
      <option>Royal Suite</option>
    </select>

    <label for="message">Message</label>
    <textarea id="message" rows="4" placeholder="Tell us your check-in and check-out dates"></textarea>

    <button type="submit" class="btn">Send Booking Request</button>
    <p id="formMessage" class="result"></p>
  </form>
</div>

<div class="footer">
  <p>Nawaz Hotel &copy; 2026</p>
  <p>Email: hello@nawazhotel.com | Phone: +91 9876543210</p>
</div>
