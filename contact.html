  <meta name="twitter:description" content="Contact details for Nawaz Hotel.">
</head>
<body>

<div class="header">
  <h1>Nawaz Hotel</h1>
</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="about.html">About</a>

  <a href="gallery.html">Gallery</a>

<div class="banner">
  <h2>Contact Us</h2>
</div>

<div class="container">
  <div class="card">
    <h3>Address</h3>
    <p>Nawaz Hotel, Main Road, Kadapa, Andhra Pradesh, India</p>
  </div>

  <div class="card">
    <h3>Phone</h3>
    <p>+91 9876543210</p>
  </div>

  <div class="card">
    <h3>Email</h3>
    <p>hello@nawazhotel.com</p>
  </div>

  <div class="clear"></div>
</div>

<div class="container">
  <h2>Send Us a Message</h2>
  <form onsubmit="return validateForm()">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label for="email">Email Address</label>
    <input type="text" id="email" placeholder="Enter your email">

    <label for="phone">Mobile Number</label>
    <input type="text" id="phone" placeholder="Enter 10 digit mobile number">

    <label for="roomType">Reason for Contact</label>
    <select id="roomType">
      <option value="">Select an Option</option>
      <option>Room Enquiry</option>
      <option>Group Booking</option>
      <option>Feedback</option>
      <option>Other</option>
    </select>

    <label for="message">Message</label>
    <textarea id="message" rows="4" placeholder="Write your message here"></textarea>

    <button type="submit" class="btn">Send Message</button>
    <p id="formMessage" class="result"></p>
  </form>
</div>

<div class="footer">
  <p>Nawaz Hotel &copy; 2026</p>
  <p>Email: hello@nawazhotel.com | Phone: +91 9876543210</p>
</div>
